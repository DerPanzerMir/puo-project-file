<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
.page-transition { display:none; }
</style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark p-2">
  <div class="container">
    <h4 class="text-white">Tech Club</h4>
    <a href="index.html" class="btn btn-primary transition-link">Home</a>
  </div>
</nav>

<div class="container mt-5 page-transition">

<h3 class="text-center">Register</h3>

<form id="form">

<input type="text" id="fullname" class="form-control mb-2" placeholder="Full Name">
<input type="email" id="email" class="form-control mb-2" placeholder="Email">
<input type="password" id="password" class="form-control mb-2" placeholder="Password">
<select id="event" class="form-select mb-3">
<option value="">Select Event</option>
<option>Workshop</option>
<option>Concert</option>
<option>Seminar</option>
</select>
<button class="btn btn-primary w-100">Submit</button>

</form>

</div>

<!-- ✅ Success Modal -->
<div class="modal fade" id="successModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content text-center p-4">
      <h4>✅ Registration Successful</h4>
      <button class="btn btn-primary mt-3" data-bs-dismiss="modal">OK</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
$(function(){
  $('.page-transition').fadeIn(400);
});

// validation styling
function setError(input){
  input.classList.add("is-invalid");
}

function setSuccess(input){
  input.classList.remove("is-invalid");
  input.classList.add("is-valid");
}

document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  let name = document.getElementById("fullname");
  let email = document.getElementById("email");
  let pass = document.getElementById("password");

  if(name.value===""){ setError(name); return; } else setSuccess(name);
  if(email.value===""){ setError(email); return; } else setSuccess(email);
  if(pass.value.length<6){ setError(pass); return; } else setSuccess(pass);

  let modal = new bootstrap.Modal(document.getElementById('successModal'));
  modal.show();

  this.reset();
});
</script>

</body>
</html>
