<!DOCTYPE html>
<html>
<head>
<title>Tech Club 2026</title>

<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- AOS Animation -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
.page-transition { display:none; }
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark p-2">
  <div class="container">
    <h4 class="text-white">Tech Club 2026</h4>

    <div>
      <a href="register.html" class="btn btn-primary transition-link">Register</a>

      <!-- ✅ Bootstrap Modal Trigger -->
      <button class="btn btn-outline-light ms-2"
      data-bs-toggle="modal"
      data-bs-target="#infoModal">
      More Info
      </button>
    </div>
  </div>
</nav>

<!-- CONTENT -->
<div class="page-transition">

<div class="hero">
  <div class="hero-slide active" style="background-image:url(https://images.unsplash.com/photo-1596496181871-9681eacf9764?q=80&w=1600);"></div>
  <div class="hero-slide" style="background-image:url(https://images.unsplash.com/photo-1581092921461-eab62e97a780?q=80&w=1600);"></div>

  <div class="hero-content text-center">
    <h1 data-aos="fade-up">🚀 Tech Club 2026</h1>
    <p data-aos="fade-up">Future-ready ideas & innovation</p>
  </div>
</div>

<div class="container mt-5">

<!-- GRID + CARD -->
<div class="row text-center">

<div class="col-md-4 mb-3" data-aos="zoom-in">
  <div class="card p-4">
    <h5>Workshop</h5>
    <p>Learn coding skills</p>

    <!-- ✅ Bootstrap Tooltip -->
    <button class="btn btn-primary"
    data-bs-toggle="tooltip"
    title="Hands-on coding session">
    Hover
    </button>
  </div>
</div>

<div class="col-md-4 mb-3" data-aos="zoom-in">
  <div class="card p-4">
    <h5>Exhibition</h5>
    <p>Explore projects</p>

    <!-- ✅ Bootstrap Popover -->
    <button class="btn btn-success"
    data-bs-toggle="popover"
    title="Exhibition"
    data-bs-content="Student innovations">
    Info
    </button>
  </div>
</div>

</div>

</div>
</div>

<!-- ✅ Bootstrap Modal -->
<div class="modal fade" id="infoModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-4">
      <div class="modal-header">
        <h5 class="modal-title">Event Info</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        Tech Club 2026 includes workshops, exhibitions and networking.
      </div>
    </div>
  </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>

<script>
AOS.init();

// tooltip & popover
var tooltipList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
tooltipList.map(el => new bootstrap.Tooltip(el))

var popoverList = [].slice.call(document.querySelectorAll('[data-bs-toggle="popover"]'))
popoverList.map(el => new bootstrap.Popover(el))

// fade
$(function(){
  $('.page-transition').fadeIn(400);
});
</script>

</body>
</html>
